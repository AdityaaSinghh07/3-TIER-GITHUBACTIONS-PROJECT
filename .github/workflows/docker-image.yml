name: Node.JS CI CD 

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  compile:
    runs-on: Agent-1

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Use Node.js 
      uses: actions/setup-node@v4
      with:
        node-version: '23'

    - name: Frontend Compilation (Syntax check)
      run: |
        cd client
        find . -name "*.js" -exec node --check{} *

    - name: Backend Compilation (Syntax check)
      run: |
        cd api
        find . -name "*.js" -exec node --check{} *
